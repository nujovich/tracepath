version: "3.9"

services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "9001:9001"
    environment:
      - AUDIT_SIGNING_KEY=${AUDIT_SIGNING_KEY}
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=9001
      - RUST_LOG=info
      - DATABASE_URL=postgres://tracepath:tracepath@postgres:5432/tracepath
      - POLICY_BUNDLE_PATH=/app/policies/bundle.tar.gz
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=tracepath-worm
      - S3_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - NATS_URL=nats://nats:4222
    volumes:
      - ../policies/bundle.tar.gz:/app/policies/bundle.tar.gz:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    restart: unless-stopped

  incident:
    build:
      context: ..
      dockerfile: docker/Dockerfile.incident
    environment:
      - NATS_URL=nats://nats:4222
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped

  policies:
    build:
      context: ..
      dockerfile: docker/Dockerfile.policies
    ports:
      - "9003:9003"
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=tracepath
      - POSTGRES_PASSWORD=tracepath
      - POSTGRES_DB=tracepath
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracepath"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: -js -sd /data
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_API_ENABLE_OBJECT_LOCK=on
    ports:
      - "9000:9000"
      - "9002:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --with-lock local/tracepath-worm || true;
      mc retention set --default compliance 365d local/tracepath-worm || true;
      echo 'Bucket tracepath-worm ready';
      "
    restart: "no"

volumes:
  pgdata:
  miniodata:
  natsdata: