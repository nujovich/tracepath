apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tracepath.fullname" . }}-gateway
  labels:
    {{- include "tracepath.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
data:
  GATEWAY_HOST: "0.0.0.0"
  GATEWAY_PORT: "9001"
  RUST_LOG: "info"
  S3_BUCKET: {{ .Values.minio.buckets | first | dig "name" "tracepath-worm" | quote }}
  S3_REGION: "us-east-1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tracepath.fullname" . }}-incident
  labels:
    {{- include "tracepath.labels" . | nindent 4 }}
    app.kubernetes.io/component: incident
data:
  NATS_URL: "nats://{{ include "tracepath.fullname" . }}-nats:4222"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracepath.fullname" . }}-gateway
  labels:
    {{- include "tracepath.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.gateway.existingSigningKeySecret }}
  AUDIT_SIGNING_KEY: {{ .Values.gateway.existingSigningKeySecret }}
  {{- else }}
  AUDIT_SIGNING_KEY: {{ .Values.gateway.signingKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.gateway.otel.enabled }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.gateway.otel.langfusePublicKey | b64enc | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.gateway.otel.langfuseSecretKey | b64enc | quote }}
  {{- end }}
